<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 浏览器标签左上角专属小logo -->
<link rel="shortcut icon" href="logo.jpg" type="image/x-icon">
    <title>记账系统教程 - iTEL</title>
    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 255, 204, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(0, 174, 255, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, #0f0f23 0%, #1a1a2e 25%, #16213e 50%, #0f3460 75%, #1a1a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 25% 25%, rgba(0, 212, 255, 0.05) 2px, transparent 2px),
                radial-gradient(circle at 75% 75%, rgba(0, 255, 204, 0.05) 2px, transparent 2px),
                radial-gradient(circle at 50% 50%, rgba(0, 174, 255, 0.05) 1px, transparent 1px);
            background-size: 100px 100px, 150px 150px, 200px 200px;
            background-position: 0 0, 50px 50px, 100px 100px;
            animation: float 20s linear infinite;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(120deg); }
            66% { transform: translateY(10px) rotate(240deg); }
            100% { transform: translateY(0px) rotate(360deg); }
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(0, 212, 255, 0.5);
            margin-right: 20px;
            transition: all 0.5s ease;
        }
        .logo:hover {
            transform: rotate(360deg) scale(1.1);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
        }
        .brand-name {
            font-size: 28px;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.8), rgba(0, 255, 204, 0.8), rgba(0, 174, 255, 0.8));
            color: #ffffff;
            border: 2px solid rgba(0, 212, 255, 0.6);
            border-radius: 25px;
            padding: 12px 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow:
                0 0 20px rgba(0, 212, 255, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        .back-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }
        .back-btn:hover {
            background: linear-gradient(135deg, rgba(0, 255, 204, 0.9), rgba(0, 212, 255, 0.9), rgba(0, 174, 255, 0.9));
            box-shadow:
                0 0 30px rgba(0, 212, 255, 0.6),
                0 0 60px rgba(0, 255, 204, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transform: translateY(-2px) scale(1.05);
            border-color: rgba(0, 255, 204, 0.8);
        }
        .back-btn:hover::before {
            left: 100%;
        }
        .back-btn:active {
            transform: translateY(0) scale(0.98);
            box-shadow:
                0 0 15px rgba(0, 212, 255, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        .content-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .video-card {
            background: rgba(26, 26, 46, 0.8);
            border: 2px solid rgba(0, 212, 255, 0.5);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            transition: all 0.3s ease;
        }
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        .video-card iframe {
            width: 100%;
            height: 200px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <button class="back-btn" onclick="goHome()">返回首页</button>

    <div class="header">
